name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Repository and Power BI validation
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validation dependencies
        run: python -m pip install --upgrade pip PyYAML

      - name: Run repository checks
        run: python scripts/ci_repository_checks.py

      - name: Run unit tests
        run: python -m unittest tests/test_powerbi_expert_factory.py -v

      - name: Validate Order2Cash sample PBIP
        run: >-
          python scripts/powerbi_expert_factory.py validate
          --project outputs/powerbi-order2cash-pbip/Order2Cash_NativeExcel
          --out outputs/powerbi-order2cash-pbip/expert_factory_validation.ci.json
