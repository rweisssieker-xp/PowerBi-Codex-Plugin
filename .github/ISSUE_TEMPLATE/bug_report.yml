name: Bug report
description: Report a reproducible defect in docs, skills, scripts, schemas, or generated Power BI artifacts.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form for reproducible defects.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Exact steps, command, prompt, or file path.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual result
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Logs, validation output, screenshots without sensitive data, or Power BI error text.
  - type: checkboxes
    id: safety
    attributes:
      label: Safety
      options:
        - label: I did not include secrets, credentials, tenant IDs, or customer-sensitive data.
          required: true

