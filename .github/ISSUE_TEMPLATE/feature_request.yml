name: Feature request
description: Propose a new capability, skill, process pack, validator, or documentation improvement.
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the business/process problem first, then the requested implementation.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Which Process Owner, expert role, or Power BI delivery gap is affected?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should be added or changed?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Skill
        - Documentation
        - Script or validator
        - Schema or template
        - Process pack
        - Power BI artifact
        - Governance or security
        - Other
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What must be true for this to be accepted?

