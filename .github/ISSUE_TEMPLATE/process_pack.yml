name: Process pack request
description: Request or improve a Power BI process analytics pack.
title: "[Process Pack]: "
labels: ["process-pack", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Use this for Lead2Order, Order2Cash, Procure2Pay, Record2Report, and other process analytics packs.
  - type: input
    id: process
    attributes:
      label: Process
      placeholder: Lead2Order, Order2Cash, Procure2Pay, ...
    validations:
      required: true
  - type: textarea
    id: owner_question
    attributes:
      label: Process Owner question
      description: Which decision should Power BI enable?
    validations:
      required: true
  - type: textarea
    id: sources
    attributes:
      label: Source systems
      description: CRM, ERP, WMS, MES, QMS, data warehouse, files, APIs, etc.
  - type: textarea
    id: kpis
    attributes:
      label: KPIs and report pages
  - type: textarea
    id: validation
    attributes:
      label: Validation needs
      description: Reconciliation, RLS, Desktop smoke, visual binding, DAX tests, M tests, owner acceptance.

